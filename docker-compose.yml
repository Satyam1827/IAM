services:
  db:
    image: postgres:17
    container_name: iam-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: iam-app
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  postgres_data: